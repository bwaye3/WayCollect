name: Build desktop app

# Everything here runs on GitHub's own servers. Nothing is compiled on your
# machine -- that's the whole point.
#
# Trigger:
#   - Push a version tag (e.g. `git tag v0.1.0 && git push origin v0.1.0`)
#     builds macOS (Apple Silicon + Intel) and Windows, and creates a DRAFT
#     GitHub Release with the installers attached. Drafts are private to you
#     until you publish them -- review and download from the Releases tab,
#     then either publish or delete.
#   - "Run workflow" from the Actions tab does the same thing manually,
#     useful for testing before you're ready to tag a real version.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  # Create the draft release ONCE, up front. Previously every matrix job raced
  # to create its own: two Mac jobs starting 4s apart both found no draft and
  # both made one, so the aarch64 installers landed in a second, near-identical
  # draft while the user was looking at the first. Now the matrix uploads into
  # a release id that already exists.
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.mk.outputs.result }}
    steps:
      - uses: actions/github-script@v7
        id: mk
        with:
          script: |
            const tag = context.ref.startsWith('refs/tags/')
              ? context.ref.replace('refs/tags/', '')
              : `untagged-${context.sha.slice(0, 7)}`;
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Watch Register ${tag}`,
              body: "Unsigned build -- see README for the first-launch step on macOS and Windows.",
              draft: true,
              prerelease: false,
              target_commitish: context.sha,
            });
            return data.id;

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"   # Apple Silicon (M1 and later)
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest"   # Intel Macs
            args: "--target x86_64-apple-darwin"
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: "npm"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust build cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install project dependencies
        run: npm install

      - name: Build the app
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          # Also attach the installers as workflow artifacts. Draft release
          # assets require push access to read; workflow artifacts only need
          # read access, so tooling authenticated with a pull-only token can
          # fetch a build without the release being published first.
          uploadWorkflowArtifacts: true
          args: ${{ matrix.args }}
